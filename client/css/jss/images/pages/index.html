<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Commerce Product Catalog</title>

  <link rel="stylesheet" href="client/css/style.css">
</head>

<body>

  <!-- 🔥 NAVBAR -->
  <header>
    <nav class="navbar">
      <h2 class="logo">E-Shop</h2>

      <ul class="nav-links">
        <li><a class="active" href="index.html">Home</a></li>
        <li><a href="client/pages/products.html">Products</a></li>
        <li><a href="client/pages/cart.html">Cart</a></li>
        <li><a href="client/pages/about.html">About</a></li>
        <li><a href="client/pages/contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- 🎯 HERO SECTION -->
  <section class="hero">
    <h1>Welcome to E-Commerce Store</h1>
    <p>Buy best products at affordable prices</p>

    <a href="client/pages/products.html">
      <button>Shop Now</button>
    </a>
  </section>

  <!-- ⭐ FEATURED PRODUCTS -->
  <section class="featured">
    <h2>Featured Products</h2>

    <div class="product-container">

      <!-- 🖥️ Laptop Product -->
      <div class="product-card">
        <img src="client/images/laptop.jpg" alt="Laptop">
        <h3>Laptop</h3>
        <p>Category: Electronics</p>
        <p><strong>Price: ₹60,000</strong></p>
        <button>Add to Cart</button>
      </div>

      <!-- 👟 Shoes Product -->
      <div class="product-card">
        <img src="client/images/shoes.jpg" alt="Shoes">
        <h3>Shoes</h3>
        <p>Category: Fashion</p>
        <p><strong>Price: ₹2,500</strong></p>
        <button>Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- 🔻 FOOTER -->
  <footer>
    <p>© 2026 E-Commerce Product Catalog | All Rights Reserved</p>
  </footer>

</body>
</html>
